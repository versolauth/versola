name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: auth
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: 1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dev -d auth"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Set up Scala CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: VirtusLab/scala-cli-setup@v1
      - name: Compile
        run: sbt compile

      - name: Run tests
        if: github.event_name != 'push'
        env:
          POSTGRES_HOST: localhost:5432
        run: sbt test

      - name: Run tests with coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          POSTGRES_HOST: localhost:5432
        run: sbt coverage test coverageReport coverageAggregate

      - name: Publish coverage badge to gist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: bd1fd5151f5190b2f8325a56610909ef
          GIST_FILENAME: versola-coverage.json
        run: scala-cli run .github/scripts/coverage-badge.scala

  docker-auth:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Build and push auth image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.auth
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/versola-auth:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/versola-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-central:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Build and push central image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.central
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/versola-central:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/versola-central:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-edge:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Build and push edge image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.edge
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/versola-edge:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/versola-edge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


